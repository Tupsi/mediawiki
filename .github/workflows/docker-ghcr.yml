name: Build and Push Docker Image to GHCR

on:
  release:
    types: [published]
  workflow_dispatch:
  push:
    paths:
      - 'Dockerfile' # Triggered automatisch, wenn die Version im Dockerfile geändert wird

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract Version from Dockerfile
        id: get_version
        run: |
          # Extrahiert die Version aus der Zeile ENV MEDIAWIKI_VERSION=...
          VERSION=$(grep 'ENV MEDIAWIKI_VERSION=' Dockerfile | cut -d '=' -f2)
          echo "mw_version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # tags i want
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.get_version.outputs.mw_version }}
            type=ref,event=tag
            type=ref,event=branch

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
