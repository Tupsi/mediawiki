name: Build and Push Docker Image to GHCR

on:
  release:
    types: [published]
  workflow_dispatch:
  push:
    paths:
      - 'Dockerfile'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Extract Version from Dockerfile
        id: get_version
        run: |
          # Extrahiert exakt den Wert der Version
          VERSION=$(grep 'ENV MEDIAWIKI_VERSION=' Dockerfile | head -n 1 | cut -d '=' -f2 | tr -d '"' | tr -d ' ')
          echo "mw_version=${VERSION}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Log in to the Container registry
        uses: docker/login-action@v6
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.get_version.outputs.mw_version }}
            type=ref,event=tag
            type=ref,event=branch

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache optimiert den Build-Prozess
          cache-from: type=gha
          cache-to: type=gha,mode=max
